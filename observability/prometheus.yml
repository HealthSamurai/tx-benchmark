global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]

  - job_name: node_exporter
    static_configs:
      - targets: [node_exporter:9100]

  # k6 pushes via remote write — no scrape config needed.
  # Enable with: k6 run --out experimental-prometheus-rw ...
  # Remote write URL: http://localhost:9090/api/v1/write
