services:
  pascal:
    build:
      context: ./upstream
      dockerfile: Dockerfile
    platform: linux/amd64
    ports:
      - "7004:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/r4/metadata"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    volumes:
      - ./config:/root/fhirserver/config
      - txcache:/var/cache/txcache

volumes:
  txcache:
    name: pascal_txcache
