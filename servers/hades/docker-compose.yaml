services:
  builder:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      - /opt/scripts/build-databases.sh
    volumes:
      - hades-data:/var/hades
      - ../../.tx-content:/source-data:ro

  hades:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on: []
    entrypoint:
      - /bin/sh
      - -lc
    command:
      - >
        test -d /var/hades/snomed.db || { echo 'snomed.db missing — run builder first'; exit 1; };
        set --;
        for d in /var/hades/snomed.db /var/hades/loinc.db; do
          [ -e "$$d" ] && set -- "$$@" "$$d";
        done;
        for d in /var/hades/packages/*; do
          [ -d "$$d" ] && set -- "$$@" "$$d/package";
        done;
        exec java -jar /opt/hades/hades.jar serve --port 8080 "$$@"
    ports:
      - "7006:8080"
    volumes:
      - hades-data:/var/hades:ro

volumes:
  hades-data:
    name: hades_data
